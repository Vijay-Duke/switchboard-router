services:
  switchboard:
    image: switchboard:latest
    container_name: switchboard
    restart: always
    ports:
      # Loopback-only publish. This MUST stay paired with SWITCHBOARD_LOCAL_PEERS
      # below: publishing on 0.0.0.0 while trusting the bridge range would hand
      # every LAN client full access to your provider credentials.
      - "127.0.0.1:20128:20128"
    volumes:
      - switchboard-data:/app/data
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      PORT: "20128"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      HEADROOM_URL: http://headroom:8787
      # Your browser reaches the container as the bridge gateway, never as
      # 127.0.0.1, so the dashboard's own /api/* calls would all return
      # "403 Local only". Trust the Docker bridge range for the socket peer.
      SWITCHBOARD_LOCAL_PEERS: 172.16.0.0/12
    depends_on:
      - headroom

  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: headroom
    restart: always
    ports:
      # switchboard reaches this over the compose network; publish for local
      # debugging only, never to the LAN.
      - "127.0.0.1:8787:8787"

volumes:
  switchboard-data:
    name: switchboard-data
