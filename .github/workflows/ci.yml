name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tests/package-lock.json

      - name: Install root deps (src/ imports)
        run: npm ci --no-audit --no-fund

      - name: Install test deps
        working-directory: tests
        run: npm ci --no-audit --no-fund

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      # Security-boundary and packaging regressions must never ship green.
      # Keep this list in sync with tests that guard an invariant, not a feature.
      - name: Run unit tests (known-pass subset)
        working-directory: tests
        run: |
          npx vitest run \
            unit/dashboard-guard.test.js \
            unit/require-api-key-gate.test.js \
            unit/combo-fusion.test.js \
            unit/switchboard-auto.test.js \
            unit/base-executor-retry.test.js \
            unit/data-dir.test.js \
            unit/standalone-start.test.js \
            unit/launch.test.js \
            unit/responses-non-stream.test.js \
            unit/cli-disable-mitm.test.js \
            unit/cli-model-catalogs.test.js \
            unit/cli-model-route-writes.test.js \
            unit/cli-tool-guides.test.js \
            unit/droid-managed-models.test.js \
            unit/ci-gate.test.js \
            unit/oauth-cursor-auto-import.test.js \
            --reporter=default

  windows-invariants:
    name: Windows launcher and recovery
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tests/package-lock.json
      - name: Install root deps
        run: npm ci --no-audit --no-fund
      - name: Install test deps
        working-directory: tests
        run: npm ci --no-audit --no-fund
      - name: Run Windows portability invariants
        working-directory: tests
        run: npx vitest run unit/standalone-start.test.js unit/launch.test.js unit/cli-disable-mitm.test.js --reporter=default

  gitbook-build:
    name: Docs build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gitbook
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gitbook/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /switchboard-router

  cli-pack:
    name: CLI pack (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cli/package-lock.json
      # CLI pack runs root Next.js build then bundles into cli/
      - name: Install root app deps
        run: npm ci --no-audit --no-fund
      - name: Install CLI deps
        working-directory: cli
        run: npm ci --no-audit --no-fund
      - name: Build + npm pack
        working-directory: cli
        run: npm run pack:cli
