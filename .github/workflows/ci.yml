name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # package-lock.json is gitignored in this repo — no cache

      - name: Install root deps (src/ imports)
        run: npm install --no-audit --no-fund

      - name: Install test deps
        working-directory: tests
        run: npm install --no-audit --no-fund

      # Security-boundary and packaging regressions must never ship green.
      # Keep this list in sync with tests that guard an invariant, not a feature.
      - name: Run unit tests (known-pass subset)
        working-directory: tests
        run: |
          npx vitest run \
            unit/dashboard-guard.test.js \
            unit/require-api-key-gate.test.js \
            unit/combo-fusion.test.js \
            unit/switchboard-auto.test.js \
            unit/base-executor-retry.test.js \
            unit/data-dir.test.js \
            unit/standalone-start.test.js \
            unit/launch.test.js \
            unit/cli-disable-mitm.test.js \
            unit/ci-gate.test.js \
            unit/oauth-cursor-auto-import.test.js \
            --reporter=default

  windows-invariants:
    name: Windows launcher and recovery
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install root deps
        run: npm install --no-audit --no-fund
      - name: Install test deps
        working-directory: tests
        run: npm install --no-audit --no-fund
      - name: Run Windows portability invariants
        working-directory: tests
        run: npx vitest run unit/standalone-start.test.js unit/launch.test.js unit/cli-disable-mitm.test.js --reporter=default

  gitbook-build:
    name: Docs build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gitbook
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /switchboard-router

  cli-pack:
    name: CLI pack (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # CLI pack runs root Next.js build then bundles into cli/
      - name: Install root app deps
        run: npm install --no-audit --no-fund
      - name: Install CLI deps
        working-directory: cli
        run: npm install --no-audit --no-fund
      - name: Build + npm pack
        working-directory: cli
        run: npm run pack:cli
