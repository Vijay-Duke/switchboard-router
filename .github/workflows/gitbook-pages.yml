# Docs site (Next static export under gitbook/).
# Deploys to GitHub Pages for THIS repo (Vijay-Duke/switchboard-router),
# not the legacy 9router/9router.github.io external repo.
name: Deploy docs (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - "gitbook/**"
      - ".github/workflows/gitbook-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gitbook
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gitbook/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build static export
        run: npm run build
        env:
          NODE_ENV: production
          # Project Pages: https://<user>.github.io/<repo>/
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gitbook/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
