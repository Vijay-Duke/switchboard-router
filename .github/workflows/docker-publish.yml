# Kept for backward compatibility: tag pushes also run release.yml which builds Docker.
# This workflow only runs on workflow_dispatch if you need a Docker-only rebuild.
name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. latest or 0.5.21)"
        required: true
        default: "latest"

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ inputs.tag }}
            ${{ env.GHCR_IMAGE }}:latest
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
