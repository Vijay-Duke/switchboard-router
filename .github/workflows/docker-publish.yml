# Docker-only recovery path. Normal images are built by release.yml.
# A recovery rebuild must originate from an existing immutable v* release tag.
name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing immutable release tag (for example v0.5.22)"
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0

      - name: Validate immutable release tag
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if ! echo "$RELEASE_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Expected an immutable v* release tag, got: $RELEASE_TAG"
            exit 1
          fi
          if [ "$(git tag --points-at HEAD | grep -Fx "$RELEASE_TAG")" != "$RELEASE_TAG" ]; then
            echo "$RELEASE_TAG does not point at the checked-out commit"
            exit 1
          fi
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.release.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
