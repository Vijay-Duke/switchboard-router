# Full release pipeline — no local npm publish needed.
#
# Trigger: push a version tag, e.g.
#   git tag v0.5.21 && git push origin v0.5.21
#
# Or: Actions → Release → Run workflow (enter tag without "v", e.g. 0.5.21)
#
# Required repo secrets:
#   NPM_TOKEN          — npm automation token with publish rights for switchboard-router
# Optional (Docker Hub; GHCR uses GITHUB_TOKEN):
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without v prefix (e.g. 0.5.21). Creates tag vX.Y.Z if missing."
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ inputs.version }}"
            VER="${VER#v}"
          else
            REF="${GITHUB_REF_NAME}"
            VER="${REF#v}"
          fi
          if ! echo "$VER" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Invalid version: $VER"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"

  test:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - working-directory: tests
        run: npm install --no-audit --no-fund
      - working-directory: tests
        run: |
          npx vitest run \
            unit/dashboard-guard.test.js \
            unit/combo-fusion.test.js \
            unit/switchboard-auto.test.js \
            unit/base-executor-retry.test.js

  publish-npm:
    name: Publish switchboard-router to npm
    needs: [resolve-version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Align package version to tag
        working-directory: cli
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version = process.env.VER;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
        env:
          VER: ${{ needs.resolve-version.outputs.version }}

      # CLI pack builds the root Next app into cli/app — need root deps first
      - name: Install root app deps
        run: npm install --no-audit --no-fund

      - name: Install CLI deps + build
        working-directory: cli
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Publish to npm
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    needs: [resolve-version, test, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag exists (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Build CLI tarball for release assets
        run: |
          npm install --no-audit --no-fund
          cd cli
          npm install --no-audit --no-fund
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version = process.env.VER;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          npm run pack:cli
          # Stable name so /releases/latest/download/switchboard-router.tgz always works
          TGZ=$(ls -1 ../../switchboard-router-*.tgz switchboard-router-*.tgz 2>/dev/null | head -1)
          if [ -z "$TGZ" ]; then
            echo "No tarball produced"
            exit 1
          fi
          cp "$TGZ" ../../switchboard-router.tgz
          cp "$TGZ" ../../"switchboard-router-${VER}.tgz" 2>/dev/null || true
          ls -la ../../switchboard-router*.tgz
        env:
          VER: ${{ needs.resolve-version.outputs.version }}

      - name: Extract changelog blurb
        id: notes
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          VER="${{ needs.resolve-version.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VER" -v tag="$TAG" '
              BEGIN { p=0 }
              $0 ~ "^# " tag || $0 ~ "^# v" ver || $0 ~ "^# " ver { p=1; print; next }
              p && /^# / { exit }
              p { print }
            ' CHANGELOG.md > /tmp/notes.md || true
          fi
          if [ ! -s /tmp/notes.md ]; then
            cat > /tmp/notes.md <<EOF
          ## ${TAG}

          ### Install
          \`\`\`bash
          npm i -g switchboard-router && switchboard
          \`\`\`

          Or from this release (no npm registry):
          \`\`\`bash
          npm i -g https://github.com/${{ github.repository }}/releases/latest/download/switchboard-router.tgz && switchboard
          \`\`\`
          EOF
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: Switchboard ${{ needs.resolve-version.outputs.tag }}
          body_path: /tmp/notes.md
          files: |
            switchboard-router.tgz
            switchboard-router-*.tgz
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker images (GHCR)
    needs: [resolve-version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.resolve-version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve-version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
