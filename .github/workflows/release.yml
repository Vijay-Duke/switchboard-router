# Full release pipeline — no local npm publish needed.
#
# Trigger: push a new, immutable version tag, e.g.
#   git tag -a v0.5.22 -m "Release v0.5.22"
#   git push origin v0.5.22
#
# The repository's "Immutable release tags" ruleset prevents updates and
# deletions of v* tags. If a published release needs a correction, increment
# the patch version and create a new tag instead of moving the existing tag.
#
# npm publishing uses Trusted Publishing (OIDC) — no NPM_TOKEN secret.
# The trusted publisher on npmjs.com must name THIS repo and THIS workflow
# filename (release.yml); npm only validates that at publish time.
#
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: |
          REF="${GITHUB_REF_NAME}"
          VER="${REF#v}"
          if ! echo "$VER" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Invalid version: $VER"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"

  test:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tests/package-lock.json
      - run: npm ci --no-audit --no-fund
      - working-directory: tests
        run: npm ci --no-audit --no-fund
      - working-directory: tests
        run: |
          npx vitest run \
            unit/dashboard-guard.test.js \
            unit/require-api-key-gate.test.js \
            unit/combo-fusion.test.js \
            unit/switchboard-auto.test.js \
            unit/base-executor-retry.test.js \
            unit/data-dir.test.js \
            unit/standalone-start.test.js \
            unit/launch.test.js \
            unit/cli-disable-mitm.test.js \
            unit/ci-gate.test.js \
            unit/oauth-cursor-auto-import.test.js

  publish-npm:
    name: Publish switchboard-router to npm
    needs: [resolve-version, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the OIDC token npm exchanges for a short-lived credential
    steps:
      - uses: actions/checkout@v4

      # Node 24 bundles npm 11.6+. Do NOT `npm install -g npm@latest` here:
      # npm overwrites its own node_modules in the toolcache and libnpmpublish
      # loses `sigstore`, which the provenance path needs — publish then dies
      # with MODULE_NOT_FOUND. Take a Node whose bundled npm already qualifies.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cli/package-lock.json

      # Fail loudly if a future Node bump ships an npm without OIDC support,
      # rather than falling back to token auth and erroring obscurely.
      - name: Assert npm supports trusted publishing (OIDC)
        run: |
          npm -v
          node -e 'const v=process.argv[1].split(".").map(Number),m=[11,5,1];
            const ok=v[0]>m[0]||(v[0]===m[0]&&(v[1]>m[1]||(v[1]===m[1]&&v[2]>=m[2])));
            if(!ok){console.error("npm >= 11.5.1 required for OIDC, got "+process.argv[1]);process.exit(1)}' "$(npm -v)"

      # CLI pack builds the root Next app into cli/app — need root deps first
      - name: Install root app deps
        run: npm ci --no-audit --no-fund

      - name: Install CLI deps
        working-directory: cli
        run: npm ci --no-audit --no-fund

      # AFTER npm ci: it aborts when package.json and package-lock.json disagree
      # on version, so the bump has to follow the install. `npm version` updates
      # both files, keeping them in sync for the publish.
      - name: Align package version to tag
        working-directory: cli
        run: npm version "$VER" --no-git-tag-version --allow-same-version
        env:
          VER: ${{ needs.resolve-version.outputs.version }}

      - name: Build CLI
        working-directory: cli
        run: npm run build

      # No NODE_AUTH_TOKEN: npm exchanges the Actions OIDC token for a
      # short-lived publish credential, and attaches provenance automatically.
      - name: Publish to npm (trusted publishing)
        working-directory: cli
        run: npm publish --access public

      # Hand the built tarball to github-release so it doesn't rebuild the
      # whole Next app a second time.
      - name: Pack tarball for the release assets
        working-directory: cli
        run: npm pack --pack-destination "$RUNNER_TEMP"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-tarball
          path: ${{ runner.temp }}/switchboard-router-*.tgz
          retention-days: 1

  github-release:
    name: GitHub Release
    needs: [resolve-version, test, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Reuse the tarball publish-npm already built — rebuilding the Next app
      # here cost ~2 minutes and could drift from what was actually published.
      - uses: actions/download-artifact@v4
        with:
          name: cli-tarball

      - name: Name release assets
        run: |
          TGZ=$(find . -maxdepth 1 -type f -name 'switchboard-router-*.tgz' -print -quit)
          if [ -z "$TGZ" ]; then
            echo "No tarball in the cli-tarball artifact"
            exit 1
          fi
          # Stable name so /releases/latest/download/switchboard-router.tgz always works
          cp "$TGZ" switchboard-router.tgz
          ls -la switchboard-router*.tgz

      - name: Extract changelog blurb
        id: notes
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          VER="${{ needs.resolve-version.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VER" -v tag="$TAG" '
              BEGIN { p=0 }
              $0 ~ "^# " tag || $0 ~ "^# v" ver || $0 ~ "^# " ver { p=1; print; next }
              p && /^# / { exit }
              p { print }
            ' CHANGELOG.md > /tmp/notes.md || true
          fi
          if [ ! -s /tmp/notes.md ]; then
            cat > /tmp/notes.md <<EOF
          ## ${TAG}

          ### Install
          \`\`\`bash
          npm i -g switchboard-router && switchboard
          \`\`\`

          Or from this release (no npm registry):
          \`\`\`bash
          npm i -g https://github.com/${{ github.repository }}/releases/latest/download/switchboard-router.tgz && switchboard
          \`\`\`
          EOF
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: Switchboard ${{ needs.resolve-version.outputs.tag }}
          body_path: /tmp/notes.md
          files: |
            switchboard-router.tgz
            switchboard-router-*.tgz
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Each arch builds on its OWN native runner and pushes by digest; the merge
  # job then stitches them into one multi-arch manifest. Building linux/arm64
  # on an amd64 runner meant QEMU-emulating the whole Next build (~10min+).
  # ubuntu-24.04-arm is free for public repos.
  docker-build:
    name: Docker ${{ matrix.arch }}
    needs: [resolve-version, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR rejects uppercase in a repository name, and this owner is
      # "Vijay-Duke". docker/metadata-action lowercases for us; a hand-written
      # image ref does not.
      - name: Compute lowercase image name
        id: img
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          outputs: type=image,name=${{ steps.img.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          # Per-arch cache scope: one shared scope would have the two jobs
          # clobbering each other's layers.
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          touch "$RUNNER_TEMP/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker:
    name: Docker manifest (GHCR)
    needs: [resolve-version, docker-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.resolve-version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve-version.outputs.tag }}
            type=raw,value=latest

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ steps.img.outputs.image }}
        run: |
          mapfile -t TAG_ARGS < <(jq -r '.tags[] | "-t", .' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          DIGEST_ARGS=()
          for digest in *; do
            [ -f "$digest" ] || continue
            DIGEST_ARGS+=("${IMAGE}@sha256:${digest}")
          done
          if [ "${#DIGEST_ARGS[@]}" -eq 0 ]; then
            echo "No image digests were downloaded"
            exit 1
          fi
          docker buildx imagetools create "${TAG_ARGS[@]}" "${DIGEST_ARGS[@]}"

      - name: Inspect
        run: docker buildx imagetools inspect "${{ steps.img.outputs.image }}:${{ needs.resolve-version.outputs.version }}"
